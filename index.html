<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Ventos Modernos — Uma Revisão Filosófica</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#03040a;display:flex;
  align-items:center;justify-content:center;flex-direction:column}
#c{display:block;width:min(96vw,1280px);height:auto;aspect-ratio:16/9;
  image-rendering:pixelated;image-rendering:crisp-edges;cursor:default;
  border:2px solid #2a2018;
  box-shadow:0 0 50px rgba(120,90,40,.15),0 0 2px rgba(180,140,60,.30)}
#sub{font-family:'Press Start 2P',monospace;font-size:9px;color:#3a3020;
  margin-top:8px;letter-spacing:.5px;text-align:center}
</style>
</head>
<body>
<canvas id="c" width="640" height="360"></canvas>
<div id="sub">↑ ↓ selecionar  ·  ENTER iniciar  ·  clique também funciona</div>
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=320,H=180;

function vmProgress(){try{return JSON.parse(localStorage.getItem('vm_progress')||'{}');}catch(e){return{};}}

const CHAPTERS=[
  {n:'I',title:'O Labirinto de Descartes',trad:'Racionalismo — Tese',href:'stage1/',key:'stage1',
   sub:'René Descartes  •  Meditações Metafísicas  •  1641'},
  {n:'II',title:'A Cruzada Sensorial',trad:'Empirismo — Antítese',href:'stage2/',key:'stage2',
   sub:'Francis Bacon · John Locke · David Hume'},
  {n:'III',title:'O Calvinista de Königsberg',trad:'Filosofia Crítica — Síntese',href:'stage3/',key:'stage3',
   sub:'Immanuel Kant  •  1781  •  Königsberg'},
];

const S={sel:0,frame:0,lastT:0};
const ROWS_Y=[88,104,120];
const ROW_H=14;

window.addEventListener('keydown',e=>{
  if(e.code==='ArrowUp'){S.sel=(S.sel+2)%3;e.preventDefault();}
  if(e.code==='ArrowDown'){S.sel=(S.sel+1)%3;e.preventDefault();}
  if(e.code==='Enter'||e.code==='Space'){go(S.sel);e.preventDefault();}
});
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  const my=((e.clientY-r.top)/r.height)*H;
  ROWS_Y.forEach((ry,i)=>{if(my>ry-ROW_H/2&&my<ry+ROW_H/2){S.sel=i;go(i);}});
});
function go(i){location.href=CHAPTERS[i].href;}

function render(){
  ctx.setTransform(2,0,0,2,0,0);
  ctx.clearRect(0,0,W,H);

  // Fundo — gradiente noturno (mescla das três paletas: gótico, âmbar, azul-frio)
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0612');
  bgGrad.addColorStop(.5,'#120e10');
  bgGrad.addColorStop(1,'#0a0c14');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Estrelas/poeira sutil
  ctx.fillStyle='rgba(180,160,120,.5)';
  for(let i=0;i<40;i++){
    const x=(i*37+~~(S.frame*.05))%W,y=(i*53)%H;
    if((i*7+~~(S.frame*.02))%19===0)ctx.fillRect(x,y,1,1);
  }

  const pulse=.5+Math.sin(S.frame*.04)*.5;
  const bg=ctx.createRadialGradient(W/2,8,4,W/2,8,120);
  bg.addColorStop(0,`rgba(200,150,60,${.10+pulse*.05})`);bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';

  // Selo do curso
  ctx.fillStyle='#5a5040';ctx.font='3px "Press Start 2P"';
  ctx.fillText('UNIFOR — Fundamentos Filosóficos e Epistemológicos',W/2,11);

  // Título
  ctx.fillStyle='#e8d8a0';ctx.font='9px "Press Start 2P"';
  ctx.fillText('VENTOS MODERNOS',W/2,28);
  ctx.fillStyle='#a89058';ctx.font='4px "Press Start 2P"';
  ctx.fillText('Uma Revisão Filosófica',W/2,40);

  ctx.fillStyle='#3a3424';
  for(let i=0;i<30;i++)ctx.fillRect(W/2-72+i*5,46,2,1);

  // Crédito acadêmico
  ctx.fillStyle='#807050';ctx.font='3px "Press Start 2P"';
  ctx.fillText('Atividade da Turma 51 de Fundamentos Filosóficos',W/2,57);
  ctx.fillText('e Epistemológicos da UNIFOR',W/2,64);
  ctx.fillStyle='#a89058';
  ctx.fillText('Prof. Dr. Filipe de Menezes Jesuino',W/2,72);

  ctx.fillStyle='#3a3424';
  for(let i=0;i<30;i++)ctx.fillRect(W/2-72+i*5,79,2,1);

  // Capítulos
  const prog=vmProgress();
  CHAPTERS.forEach((c,i)=>{
    const y=ROWS_Y[i],isSel=i===S.sel,done=!!prog[c.key];
    if(isSel){
      ctx.fillStyle='rgba(200,160,60,.10)';
      ctx.fillRect(28,y-8,W-56,ROW_H);
    }
    ctx.fillStyle=isSel?'#f0d878':'#9a8860';
    ctx.font='4px "Press Start 2P"';ctx.textAlign='left';
    const cursor=isSel?'▶ ':'  ';
    ctx.fillText(cursor+c.n+'. '+c.title,32,y);
    ctx.textAlign='right';
    if(done){ctx.fillStyle='#70b060';ctx.fillText('✓',W-32,y);}
    ctx.textAlign='left';
    ctx.fillStyle=isSel?'#7a6840':'#4a4030';ctx.font='3px "Press Start 2P"';
    ctx.fillText('   '+c.trad,32,y+7);
    ctx.textAlign='center';
  });

  // Filósofo(s) do capítulo selecionado
  ctx.fillStyle='#4a4030';ctx.font='3px "Press Start 2P"';
  ctx.fillText(CHAPTERS[S.sel].sub,W/2,140);

  ctx.fillStyle='#3a3424';
  for(let i=0;i<30;i++)ctx.fillRect(W/2-72+i*5,148,2,1);

  if(S.frame%30<20){
    ctx.fillStyle='#e8d070';ctx.font='4px "Press Start 2P"';
    ctx.fillText('PRESSIONE ENTER',W/2,162);
  }
  ctx.fillStyle='#5a5040';ctx.font='3px "Press Start 2P"';
  ctx.fillText('Tese → Antítese → Síntese',W/2,172);

  ctx.textAlign='left';
}

function loop(ts){
  S.frame++;
  render();
  requestAnimationFrame(loop);
}
document.fonts.ready.then(()=>requestAnimationFrame(loop));
</script>
</body>
</html>
