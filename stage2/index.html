function parseMidi(b64){
  const raw=atob(b64),d=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)d[i]=raw.charCodeAt(i);
  const div=(d[12]<<8)|d[13];
  function vl(d,p){let v=0;while(true){const b=d[p++];v=(v<<7)|(b&0x7F);if(!(b&0x80))break;}return[v,p];}
  // Extrair tracks
  const tracks=[];let pos=14;
  while(pos<d.length){
    if(d[pos]===0x4D&&d[pos+1]===0x54&&d[pos+2]===0x72&&d[pos+3]===0x6B){
      const tl=(d[pos+4]<<24)|(d[pos+5]<<16)|(d[pos+6]<<8)|d[pos+7];
      tracks.push(d.slice(pos+8,pos+8+tl));pos+=8+tl;
    }else pos++;
  }
  // Tempo map (track 0)
  const tmap=[[0,500000]];
  {const t=tracks[0];let p=0,tk=0;
   while(p<t.length){let[dl,p2]=vl(t,p);p=p2;tk+=dl;if(p>=t.length)break;
     const b=t[p];
     if(b===0xFF){p++;const mt=t[p++];let[ml,p3]=vl(t,p);p=p3;
       if(mt===0x51&&ml===3)tmap.push([tk,(t[p]<<16)|(t[p+1]<<8)|t[p+2]]);
       p+=ml;}else if(b&0x80)p++;}}
  // Tick → segundos com mapa de tempo
  function t2s(tk){
    let s=0,pt=0,ptp=tmap[0][1];
    for(let i=1;i<tmap.length;i++){const[mt,mtp]=tmap[i];
      if(tk<=mt)break;s+=(Math.min(tk,mt)-pt)*ptp/1e6/div;pt=mt;ptp=mtp;}
    return s+(tk-pt)*ptp/1e6/div;
  }
  // Extrair notas de todas as tracks musicais
  const notes=[];
  for(let ti=1;ti<tracks.length;ti++){
    const t=tracks[ti];let p=0,tk=0,ls=0;const pend={};
    while(p<t.length){
      let[dl,p2]=vl(t,p);p=p2;tk+=dl;if(p>=t.length)break;
      let b=t[p];
      if(b===0xFF){p++;const mt=t[p++];let[ml,p3]=vl(t,p);p=p3+ml;}
      else if(b===0xF0||b===0xF7){p++;let[sl,p3]=vl(t,p);p=p3+sl;}
      else{
        if(b&0x80){ls=b;p++;}else b=ls;
        const cmd=b&0xF0,ch=b&0x0F;
        if(cmd===0x90){
          const pitch=t[p],vel=t[p+1];p+=2;const k=(ch<<7)|pitch;

          else if(pend[k]){const[st,v]=pend[k];delete pend[k];
            notes.push([t2s(st),440*2**((pitch-69)/12),Math.max(0.05,t2s(tk)-t2s(st)),v/127]);}
        }else if(cmd===0x80){
          const pitch=t[p];p+=2;const k=(ch<<7)|pitch;
          if(pend[k]){const[st,v]=pend[k];delete pend[k];
            notes.push([t2s(st),440*2**((pitch-69)/12),Math.max(0.05,t2s(tk)-t2s(st)),v/127]);}
        }else if(cmd===0xA0||cmd===0xB0||cmd===0xE0)p+=2;
        else if(cmd===0xC0||cmd===0xD0)p+=1;
      }
    }
  }
  return notes.sort((a,b)=>a[0]-b[0]);
}

function startMidi(){
  if(!AC||!_midiNotes)return;
  const now=AC.currentTime;
  _midiNotes.forEach(([t,freq,dur,vel])=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(0,now+t);
    g.gain.linearRampToValueAtTime(vel*MIDI_VOL,now+t+0.04);
    g.gain.setValueAtTime(vel*MIDI_VOL,now+t+dur*0.85);
    g.gain.linearRampToValueAtTime(0,now+t+dur);
    o.connect(g);g.connect(revIn);
    o.start(now+t);o.stop(now+t+dur+0.06);
  });
  setTimeout(startMidi,(_midiDur+1.5)*1000);
}


// ── ÁUDIO ─────────────────────────────────────────────────────────
let AC=null,revIn=null;
function initAudio(){
  if(AC)return;
  try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    setupReverb();
    if(!_midiNotes){_midiNotes=parseMidi(MIDI_B64);_midiDur=_midiNotes.reduce((mx,[t,,d])=>Math.max(mx,t+d),0);}
    setTimeout(startMidi,600);
  }catch(e){AC=null;}
}
function setupReverb(){
  if(!AC||revIn)return;
  const wet=AC.createGain();wet.gain.value=.25;wet.connect(AC.destination);
  revIn=AC.createGain();revIn.gain.value=1;
  [.067,.089,.113].forEach((d,i)=>{
    const dl=AC.createDelay(.5),fb=AC.createGain();
    dl.delayTime.value=d;fb.gain.value=.20-.02*i;
    revIn.connect(dl);dl.connect(fb);fb.connect(dl);dl.connect(wet);
  });
}
function fm(cFreq,mRatio,idx,delay,dur,vol,noRev){
  if(!AC)return;
  const t=AC.currentTime+delay;

  const mG=AC.createGain(),env=AC.createGain();
  c.type=m.type='sine';
  c.frequency.value=cFreq;m.frequency.value=cFreq*mRatio;mG.gain.value=cFreq*idx;
  m.connect(mG);mG.connect(c.frequency);c.connect(env);
  env.connect(AC.destination);
  if(!noRev&&revIn)env.connect(revIn);
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(vol,t+.015);
  env.gain.exponentialRampToValueAtTime(vol*.7,t+.08);
  env.gain.setValueAtTime(vol*.7,t+Math.max(dur-.12,t+.09));
  env.gain.linearRampToValueAtTime(.0001,t+dur);
  m.start(t);c.start(t);m.stop(t+dur+.02);c.stop(t+dur+.02);
}

  if(!AC)return;

  const o=AC.createOscillator(),lfo=AC.createOscillator();

  o.type='triangle';lfo.frequency.value=5.5;lG.gain.value=freq*.008;
  lfo.connect(lG);lG.connect(o.frequency);o.frequency.value=freq;
  o.connect(env);env.connect(AC.destination);if(revIn)env.connect(revIn);
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(vol,t+.04);
  env.gain.setValueAtTime(vol*.75,t+.2);
  env.gain.setValueAtTime(vol*.75,t+Math.max(dur-.15,t+.21));
  env.gain.linearRampToValueAtTime(.0001,t+dur);
  lfo.start(t);o.start(t);lfo.stop(t+dur);o.stop(t+dur);
}
function playStep(){
  if(!AC)return;
  const t=AC.currentTime;
  const o=AC.createOscillator(),env=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(130,t);
  o.frequency.exponentialRampToValueAtTime(40,t+.06);
  o.connect(env);env.connect(AC.destination);
  env.gain.setValueAtTime(.14,t);
  env.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.start(t);o.stop(t+.1);
}
function playSuccess(){
  [[330,.0],[415,.13],[523,.26],[659,.4]].forEach(([f,d])=>fm(f,14,1,d,.38,.15));
}
function playWrong(){
  fm(220,1.5,8,0,.4,.2);fm(196,1.8,10,.15,.42,.18);fm(165,2.2,12,.32,.5,.2);
}
function playEvilLaugh(){
  if(!AC)return;
  for(let i=0;i<5;i++)fm(300-i*35,2,6,i*.22,.22,.22-i*.02,true);
  const t=AC.currentTime+1.2;
  const o=AC.createOscillator(),lfo=AC.createOscillator();
  const lG=AC.createGain(),env=AC.createGain();
  lfo.frequency.value=11;lG.gain.value=110;
  lfo.connect(lG);lG.connect(o.frequency);
  o.connect(env);env.connect(AC.destination);
  o.type='square';o.frequency.value=180;
  o.frequency.linearRampToValueAtTime(55,t+1.4);
  env.gain.setValueAtTime(.22,t);env.gain.linearRampToValueAtTime(.001,t+1.6);
  lfo.start(t);o.start(t);lfo.stop(t+1.7);o.stop(t+1.7);
}
function playFanfare(){
  [[262,330,392,.0],[330,415,523,.22],[392,494,659,.44],[523,659,784,.66]]

  [[523,.9],[659,.9],[784,.9]].forEach(([f,d])=>warm(f,d,2.8,.07));

// ── AUXILIARES ────────────────────────────────────────────────────
function tileAt(col,row){
  if(col<0||col>=MC||row<0||row>=MR)return WALL;
  return MAP[row][col];
}
function solid(t){
  return t===WALL||t===DOOR||t===VOID||
         t===T_BP||t===T_BT||t===T_MACA||t===T_PENA||t===T_VELA||
         t===T_B1||t===T_B2||t===T_B3;
}
function canGo(x,y){
  const hw=4,hh=6,f=n=>Math.floor(n/T);
  return!solid(tileAt(f(x-hw),f(y-hh)))&&!solid(tileAt(f(x+hw),f(y-hh)))&&
         !solid(tileAt(f(x-hw),f(y+hh)))&&!solid(tileAt(f(x+hw),f(y+hh)));
}
function camSync(){
  S.cx=Math.max(0,Math.min(MC*T-W,Math.round(S.px-W/2)));
  S.cy=Math.max(0,Math.min(MR*T-H,Math.round(S.py-H/2)));
}
function nearObj(){
  const pc=Math.floor(S.px/T),pr=Math.floor(S.py/T);
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const r=pr+dr,c=pc+dc;
    if(r<0||r>=MR||c<0||c>=MC)continue;
    const t=MAP[r][c];
    if(S.progress===0){
      if(t===T_BP)return'pilar_'+r+'_'+c;
      if(t===T_BT)return'bacon_table';
    }
    if(S.progress===1){
      if(t===T_MACA&&!S.lockeCompleted[0])return'locke_maca';
      if(t===T_PENA&&!S.lockeCompleted[1])return'locke_pena';
      if(t===T_VELA&&!S.lockeCompleted[2])return'locke_vela';
    }
    if(S.progress===2){
      if(t===T_B1&&!S.humeCompleted[0])return'hume_0';
      if(t===T_B2&&!S.humeCompleted[1])return'hume_1';
      if(t===T_B3&&!S.humeCompleted[2])return'hume_2';
    }
  }
  return null;
}

function openDlg(key){
  if(key.startsWith('pilar_')){
    const pk=key.slice(6);
    const p=PILARS[pk];
    S.pilarKey=pk;S.dKey='pilar';
    S.dNarrative=['[ '+p.name+' ]',...p.desc];
    S.dQuestion='Incluir na seleção de Ídolos?';
    const isSel=S.baconSelected.has(pk);
    S.dOpts=[isSel?'1. Remover marca':'1. Marcar como Ídolo','2. Ignorar'];
    S.dSel=0;
  } else if(key==='bacon_table'){
    if(S.baconSelected.size<4){
      S.okMsg=['Marque mais '+(4-S.baconSelected.size)+' Ídolo(s).','Use [E] nos pilares de pedra.'];
      S.okT=2.2;return;
    }
    const names=[...S.baconSelected].map(k=>PILARS[k].name);
    S.dKey='bacon_table';
    S.dNarrative=['Sua seleção:',...names.map(n=>'  '+n),'','Confirmar estes 4 Ídolos?'];
    S.dQuestion='Esta é a tipologia de Francis Bacon?';
    S.dOpts=['1. Confirmar seleção','2. Cancelar'];
    S.dSel=0;
  } else if(key==='locke_maca'||key==='locke_pena'||key==='locke_vela'){
    const st=LOCKE_DATA[key];
    S.dKey=key;S.dNarrative=st.intro;S.dQuestion=st.name;
    S.lockeItems=st.items;S.lockeItemIdx=0;
    S.lockeResult=null;S.lockeFeedback='';S.dSel=0;
  } else if(key.startsWith('hume_')){
    const si=parseInt(key.slice(5));
    const sc=HUME_SC[si];
    S.humeIdx=si;S.dKey='hume';S.dNarrative=sc.sit;S.dQuestion=sc.q;S.dOpts=sc.opts;S.dSel=0;
  }
  S.dTotal=S.dNarrative.reduce((s,l)=>s+Math.max(1,l.length),0);
  S.dIdx=0;S.dPhase='typing';S.scene='dialogue';
}

function pickOpt(idx){
  if(idx>=S.dOpts.length)return;

  // ── Pilar de Bacon ──
  if(S.dKey==='pilar'){
    const pk=S.pilarKey;
    if(idx===0){
      if(S.baconSelected.has(pk)){
        S.baconSelected.delete(pk);
      } else {
        if(S.baconSelected.size<4)S.baconSelected.add(pk);
        else{S.okMsg=['Já marcou 4.','Desmarque um antes de marcar outro.'];S.okT=2.0;}
      }
    }
    S.scene='playing';S.dKey=null;return;
  }

  // ── Mesa de confirmação ──
  if(S.dKey==='bacon_table'){
    if(idx===0){
      const isOk=[...S.baconSelected].every(k=>CORRECT_PILARS.has(k))&&S.baconSelected.size===4;
      if(isOk){
        playSuccess();
        S.progress=1;
        DR1.forEach(([r,c])=>MAP[r][c]=FLOOR);
        S.okMsg=['Os Ídolos foram estilhaçados!','A mente está limpa.','Porta aberta — avance.'];
        S.okT=3.2;
      } else {
        playWrong();
        S.baconSelected=new Set();
        S.berkujohMsg=['Ainda há ilusões na sua mente.','Suas marcas foram removidas.','Revise os pilares.'];
        S.berkujohT=4.0;
        S.okMsg=['Seleção incorreta.','Tente de novo.'];S.okT=2.0;
      }
    }
    S.scene='playing';S.dKey=null;return;
  }

  // ── Cenário de Hume ──
  if(S.dKey==='hume'){
    const sc=HUME_SC[S.humeIdx];
    if(idx===sc.ok){
      playSuccess();
      S.humeCompleted[S.humeIdx]=true;
      const allDone=S.humeCompleted.every(c=>c);
      if(allDone){
        setTimeout(playFanfare,300);
        S.scene='epiphany';S.epT=0;S.experienced=false;S.progress=3;
      } else {
        const rem=3-S.humeCompleted.filter(c=>c).length;
        S.okMsg=['Correto — '+sc.name+'.',rem+' cenário(s) restante(s).'];S.okT=2.4;
        S.scene='playing';
      }
    } else {
      playWrong();
      S.berkujohMsg=[sc.fbs[idx],'Reflita. Tente novamente.'];
      S.berkujohT=4.2;
      S.scene='playing';
    }
    S.dKey=null;return;
  }
}

function classifyItem(answer){
  const item=S.lockeItems[S.lockeItemIdx];
  const isRight=answer===item.c;
  S.lockeResult=isRight?'right':'wrong';
  S.lockeFeedback=isRight?item.fR:item.fW;
  if(isRight)playSuccess();else playWrong();
  S.dPhase='class_result';
}

function respawn(){
  if(S.progress===0){S.px=15*T;S.py=4*T+8;}
  else if(S.progress===1){S.px=15*T;S.py=16*T+8;}
  else{S.px=15*T;S.py=28*T+8;}
  camSync();
}

// ── UPDATE ────────────────────────────────────────────────────────
function update(dt){
  S.frame++;S.mf=(S.mf+dt)%1.4;
  if(S.okT>0)S.okT-=dt;
  if(S.berkujohT>0)S.berkujohT-=dt;
  if(S.sectorLabelT>0)S.sectorLabelT-=dt;

  if(S.scene==='menu'){
    if(KP.Enter||KP.Space){S.scene='intro';S.introIdx=0;}
    if(KP.Escape)location.href='../index.html';
  }
  else if(S.scene==='intro'){
    S.charAccum+=dt*26;
    const introAdv=~~S.charAccum;S.charAccum-=introAdv;
    S.introIdx=Math.min(INTRO_TOTAL,S.introIdx+introAdv);
    if(KP.Enter||KP.Space){
      if(S.introIdx<INTRO_TOTAL)S.introIdx=INTRO_TOTAL;
      else S.scene='playing';
    }
  }
  else if(S.scene==='playing'){
    let dx=0,dy=0;
    if(K.ArrowLeft||K.KeyA){dx=-1;S.face=3;}
    if(K.ArrowRight||K.KeyD){dx=1;S.face=1;}
    if(K.ArrowUp||K.KeyW){dy=-1;S.face=0;}
    if(K.ArrowDown||K.KeyS){dy=1;S.face=2;}
    if(dx&&dy){dx*=.707;dy*=.707;}
    S.moving=dx!==0||dy!==0;
    const sp=58*dt;
    const nx=S.px+dx*sp,ny=S.py+dy*sp;
    if(canGo(nx,ny)){S.px=nx;S.py=ny;}
    else if(canGo(nx,S.py))S.px=nx;
    else if(canGo(S.px,ny))S.py=ny;
    S.px=Math.max(8,Math.min(MC*T-8,S.px));
    S.py=Math.max(8,Math.min(MR*T-8,S.py));
    if(S.moving){
      S.pft+=dt;
      if(S.pft>.35){S.pft=0;S.pf^=1;}
      if(S.pf!==S.prevPf){playStep();S.prevPf=S.pf;}
    } else {S.pf=0;S.pft=0;S.prevPf=-1;}
    camSync();
    const pr=Math.floor(S.py/T);
    const sec=pr<14?0:pr<26?1:2;
    if(sec!==S.lastSector){
      S.lastSector=sec;
      const lb=['I — Biblioteca de Bacon','II — Laboratório de Locke','III — Anfiteatro de Hume'];
      S.sectorLabel=lb[sec];S.sectorLabelT=2.8;
    }
    if(KP.KeyE||KP.Space||KP.Enter){const o=nearObj();if(o)openDlg(o);}
  }
  else if(S.scene==='dialogue'){
    if(S.dPhase==='typing'){
      if(KP.Space||KP.Enter){S.dIdx=S.dTotal;S.charAccum=0;}
      else{S.charAccum+=dt*26;const adv=~~S.charAccum;S.charAccum-=adv;S.dIdx=Math.min(S.dTotal,S.dIdx+adv);}
      if(S.dIdx>=S.dTotal){S.dPhase='waiting';S.charAccum=0;}
    }
    else if(S.dPhase==='waiting'){
      if(KP.Enter||KP.Space){
        if(S.dKey&&S.dKey.startsWith('locke_'))S.dPhase='classifying';
        else S.dPhase='choosing';
      }
    }
    else if(S.dPhase==='choosing'){
      if(KP.ArrowUp||KP.KeyW)S.dSel=Math.max(0,S.dSel-1);
      if(KP.ArrowDown||KP.KeyS)S.dSel=Math.min(S.dOpts.length-1,S.dSel+1);
      if(KP.Digit1)pickOpt(0);
      if(KP.Digit2)pickOpt(1);
      if(KP.Digit3)pickOpt(2);
      if(KP.Enter||KP.Space)pickOpt(S.dSel);
    }
    else if(S.dPhase==='classifying'){
      if(KP.Digit1)classifyItem(1);
      else if(KP.Digit2)classifyItem(2);
    }
    else if(S.dPhase==='class_result'){
      if(KP.Enter||KP.Space){
        if(S.lockeResult==='right'){
          S.lockeItemIdx++;
          if(S.lockeItemIdx>=S.lockeItems.length)S.dPhase='class_done';
          else S.dPhase='classifying';
        } else {
          S.dPhase='classifying'; // bloqueia: retry obrigatório
        }
        S.lockeResult=null;
      }
    }
    else if(S.dPhase==='class_done'){
      if(KP.Enter||KP.Space){
        const si={locke_maca:0,locke_pena:1,locke_vela:2}[S.dKey];
        if(si!==undefined)S.lockeCompleted[si]=true;
        const allDone=S.lockeCompleted.every(c=>c);
        S.scene='playing';S.dKey=null;
        if(allDone){
          S.progress=2;
          DR2.forEach(([r,c])=>MAP[r][c]=FLOOR);
          S.berkujohMsg=['...Você está reconstruindo','mais rápido do que deveria.'];
          S.berkujohT=3.8;
          S.okMsg=['Laboratório concluído.','Anfiteatro de Hume aberto.'];S.okT=3.2;
        } else {
          const rem=3-S.lockeCompleted.filter(c=>c).length;
          S.okMsg=[rem+' estação(ões) restante(s).'];S.okT=1.8;
        }
      }
    }
  }
  else if(S.scene==='gameover'){
    if(KP.Enter||KP.Space){respawn();S.scene='playing';}
  }
  else if(S.scene==='epiphany'){
    S.epT+=dt;
    if(S.epT>9.4&&(KP.Enter||KP.Space)){
      vmComplete('stage2');
      location.href='../stage3/';
    }
  }

  for(const k in KP)delete KP[k];
}

function rTiles(){
  const cx=S.cx,cy=S.cy;
  const c0=Math.max(0,~~(cx/T)),c1=Math.min(MC,~~((cx+W)/T)+2);
  const r0=Math.max(0,~~(cy/T)),r1=Math.min(MR,~~((cy+H)/T)+2);
  for(let r=r0;r<r1;r++)for(let c=c0;c<c1;c++)
    drawTile(c*T-cx,r*T-cy,MAP[r][c],c,r);
}
function drawTile(sx,sy,tp,c,r){
  const n=S.frame;
  switch(tp){
    case VOID:
      ctx.fillStyle='#020100';ctx.fillRect(sx,sy,T,T);break;
    case FLOOR:
      drawSpr(FL_TILE2,TPAL2,sx,sy,1);
      ctx.fillStyle='#201a0e';
      if((c*7+r*13)%11===0)ctx.fillRect(sx+4,sy+4,1,1);
      if((c*3+r*7)%9===0)ctx.fillRect(sx+11,sy+11,1,1);
      if((c+r*11)%15===0)ctx.fillRect(sx+8,sy+7,1,1);
      break;
    case WALL:{
      const ev=r%2===0;
      const st=[ev?[0,0,7,7]:[0,0,4,7],ev?[8,0,8,7]:[5,0,7,7],
               !ev?[13,0,3,7]:null,
               ev?[0,8,4,7]:[0,8,7,7],ev?[5,8,7,7]:[8,8,8,7],
               ev?[13,8,3,7]:null];
      const pal={...TPAL2,'2':'#4a3820','3':'#1e160a'};
      st.forEach((b,bi)=>{
        if(!b)return;
        const [bx,by]=b;
        const vi=((c+~~(bx/5))^(r+~~(by/6)))%3;
        pal[String(4+bi)]=['#3a2c18','#362818','#382a1a'][vi];
      });
      drawSpr(ev?WL_TILE2_EVEN:WL_TILE2_ODD,pal,sx,sy,1);
      break;
    }
    case DOOR:
      drawSpr(DR_TILE2,TPAL2,sx,sy,1);
      break;
    case T_BP:{
      const isSel=S.baconSelected.has(r+'_'+c);
      drawSpr(BP_BASE,TPAL2,sx,sy,1);
      if(isSel){
        const gv=.65+Math.sin(n*.09)*.35;
        const pal={...TPAL2,'2':`rgba(210,150,40,${gv})`,'3':`rgba(210,150,40,${gv*.3})`};
        drawSpr(BP_SEL_CROSS,pal,sx,sy,1);
        drawSpr(BP_SEL_OVERLAY,pal,sx,sy,1);
      } else {
        drawSpr(BP_UNSEL,TPAL2,sx,sy,1);
      }
      break;
    }
    case T_BT:{
      drawSpr(BT_BASE,TPAL2,sx,sy,1);
      if(S.baconSelected.size===4&&S.progress===0){
        const gv=.55+Math.sin(n*.1)*.45;
        ctx.fillStyle=`rgba(210,160,40,${gv*.5})`;ctx.fillRect(sx,sy,T,T);
        ctx.fillStyle=`rgba(210,160,40,${gv})`;
        ctx.fillRect(sx,sy,T,1);ctx.fillRect(sx,sy+T-1,T,1);
        ctx.fillRect(sx,sy,1,T);ctx.fillRect(sx+T-1,sy,1,T);
      }
      break;
    }
    case T_MACA:{
      drawSpr(MACA_TILE,TPAL2,sx,sy,1);
      if(!S.lockeCompleted[0]&&S.progress===1){
        ctx.fillStyle=`rgba(200,80,40,${.15+Math.sin(n*.07)*.1})`;
        ctx.fillRect(sx+2,sy+1,T-4,T-5);
      }
      break;
    }
    case T_PENA:{
      drawSpr(PENA_TILE,TPAL2,sx,sy,1);
      if(!S.lockeCompleted[1]&&S.progress===1){
        ctx.fillStyle=`rgba(160,160,200,${.15+Math.sin(n*.07+1)*.1})`;
        ctx.fillRect(sx+2,sy+1,T-4,T-5);
      }
      break;
    }
    case T_VELA:{
      drawSpr(VELA_BASE,TPAL2,sx,sy,1);
      const fl=Math.sin(n*.28),fl3=Math.cos(n*.19);
      const fo=fl>.3?1:0,fo2=fl3>.25?1:0;
      ctx.fillStyle='#ff6010';ctx.fillRect(sx+7,sy-3+fo,3,3);
      ctx.fillStyle='#ffb820';ctx.fillRect(sx+7,sy-4+fo,3,3);
      ctx.fillStyle='#fff060';ctx.fillRect(sx+8,sy-5+fo2,2,2);
      ctx.fillStyle='#fffbd0';ctx.fillRect(sx+8,sy-4,1,1);
      if(!S.lockeCompleted[2]&&S.progress===1){
        ctx.fillStyle=`rgba(200,140,30,${.15+Math.sin(n*.07+2)*.1})`;
        ctx.fillRect(sx+3,sy-2,T-6,T-4);
      }
      break;
    }
    case T_B1:{
      // Colisão Direta — bolas próximas
      drawSpr(B1_TILE,TPAL2,sx,sy,1);
      if(S.progress===2&&!S.humeCompleted[0]){
        ctx.fillStyle=`rgba(180,80,40,${.18+Math.sin(n*.07)*.1})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
    case T_B2:{
      // Colisão com Intervalo — bolas separadas, pontilhado animado
      drawSpr(B2_TILE,TPAL2,sx,sy,1);
      if(n%16<8){ctx.fillStyle='rgba(180,150,60,.8)';ctx.fillRect(sx+7,sy+7,1,1);}
      if(S.progress===2&&!S.humeCompleted[1]){
        ctx.fillStyle=`rgba(60,100,180,${.18+Math.sin(n*.07+1)*.1})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
    case T_B3:{
      // O Garfo de Hume — bolas paradas + símbolo Y pulsante
      drawSpr(B3_BASE,TPAL2,sx,sy,1);
      const ph=n*.08,fc=~~(150+Math.sin(ph)*55);
      const palY={...TPAL2,'2':`rgb(${fc},${~~(fc*.25)},${fc})`};
      drawSpr(B3_Y,palY,sx,sy,1);
      if(S.progress===2&&!S.humeCompleted[2]){
        ctx.fillStyle=`rgba(${fc},0,${fc},${.18+Math.sin(n*.07+2)*.1})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
  }
}

// ── ILUMINAÇÃO ────────────────────────────────────────────────────
function rLight(){
  lx.setTransform(2,0,0,2,0,0);
  lx.clearRect(0,0,W,H);
  // mundo sensível — overlay muito mais leve que o labirinto
  lx.fillStyle='rgba(0,0,0,.40)';lx.fillRect(0,0,W,H);
  lx.globalCompositeOperation='destination-out';
  // Luz da personagem (raio maior, mais quente)
  const px=~~(S.px-S.cx),py=~~(S.py-S.cy);
  const g=lx.createRadialGradient(px,py-4,2,px,py-4,82);
  g.addColorStop(0,'rgba(255,225,145,1)');
  g.addColorStop(.32,'rgba(240,175,75,.72)');
  g.addColorStop(.68,'rgba(175,105,32,.30)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  lx.fillStyle=g;lx.beginPath();lx.arc(px,py-4,82,0,Math.PI*2);lx.fill();
  // Luzes fixas — Setor I Bacon (archotes nas paredes)
  if(S.progress===0){
    addGlowAt(0*T-S.cx,2*T+8-S.cy,30,200,155,65);
    addGlowAt(29*T+16-S.cx,2*T+8-S.cy,30,200,155,65);
    addGlowAt(0*T-S.cx,8*T+8-S.cy,30,200,155,65);
    addGlowAt(29*T+16-S.cx,8*T+8-S.cy,30,200,155,65);
    for(const pk of S.baconSelected){
      const[rr,cc]=pk.split('_').map(Number);
      addGlowAt(cc*T+8-S.cx,rr*T+8-S.cy,16,210,150,40);
    }
    if(S.baconSelected.size===4)addGlowAt(24*T+8-S.cx,5*T+8-S.cy,22,200,160,40);
  }
  // Luzes fixas — Setor II Locke
  if(S.progress===1){
    addGlowAt(0*T-S.cx,15*T+8-S.cy,28,190,145,55);
    addGlowAt(29*T+16-S.cx,15*T+8-S.cy,28,190,145,55);
    addGlowAt(0*T-S.cx,21*T+8-S.cy,28,190,145,55);
    addGlowAt(29*T+16-S.cx,21*T+8-S.cy,28,190,145,55);
    if(!S.lockeCompleted[0])addGlowAt(5*T+8-S.cx,16*T+8-S.cy,18,200,80,40);
    if(!S.lockeCompleted[1])addGlowAt(15*T+8-S.cx,18*T+8-S.cy,16,160,160,200);
    if(!S.lockeCompleted[2])addGlowAt(23*T+8-S.cx,20*T+8-S.cy,20,200,140,30);
  }
  // Luzes fixas — Setor III Hume (arena central + três cenários)
  if(S.progress===2){
    addGlowAt(15*T+8-S.cx,30*T+8-S.cy,45,185,125,65);
    if(!S.humeCompleted[0])addGlowAt(6*T+8-S.cx,30*T+8-S.cy,18,200,80,40);
    if(!S.humeCompleted[1])addGlowAt(14*T+8-S.cx,30*T+8-S.cy,16,60,100,210);
    if(!S.humeCompleted[2])addGlowAt(22*T+8-S.cx,30*T+8-S.cy,18,160,40,190);
  }
  lx.globalCompositeOperation='source-over';
  ctx.drawImage(lc,0,0,W,H);
}
function addGlowAt(ox,oy,rad,cr,cg,cb){
  if(ox<-50||ox>W+50||oy<-50||oy>H+50)return;
  const fl=.92+Math.sin(S.frame*.18)*.08,r=rad*fl;
  const g=lx.createRadialGradient(ox,oy,0,ox,oy,r);
  g.addColorStop(0,`rgba(${cr},${cg},${cb},.75)`);g.addColorStop(1,'rgba(0,0,0,0)');
  lx.fillStyle=g;lx.beginPath();lx.arc(ox,oy,r,0,Math.PI*2);lx.fill();
}

function rGameover(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,15,W/2,H/2,W*.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(60,0,0,.7)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#880e08';ctx.font='7px "Press Start 2P"';ctx.fillText('INCORRETO!',W/2,32);
  ctx.fillStyle='#2e1c10';
  for(let i=0;i<28;i++)ctx.fillRect(W/2-68+i*5,40,3,1);
  ctx.fillStyle='#c09860';ctx.font='4px "Press Start 2P"';
  S.goMsg.forEach((l,i)=>ctx.fillText(l,W/2,54+i*12));
  if(S.mf<.92){
    ctx.fillStyle='#e8c870';ctx.font='5px "Press Start 2P"';
    ctx.fillText('ENTER: tentar novamente',W/2,148);
  }
  ctx.textAlign='left';
}

// ── EPIFANIA ──────────────────────────────────────────────────────
function rEpiphany(){
  const t=S.epT;
  const p=Math.min(1,t/1.4);
  ctx.fillStyle=`rgb(${~~(p*225)},${~~(p*165)},${~~(p*28)})`;
  ctx.fillRect(0,0,W,H);
  if(t>1){
    ctx.fillStyle='rgba(5,3,10,.88)';ctx.fillRect(0,0,W,H);
    const ga=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.85);
    ga.addColorStop(0,'rgba(210,165,40,.28)');ga.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ga;ctx.fillRect(0,0,W,H);
    const ta=Math.min(1,(t-1)/.9);
    ctx.globalAlpha=ta;ctx.textAlign='center';

    // Fase 1: Berkujoh reconhece a derrota
    if(t<3.0){
      ctx.fillStyle='#806028';ctx.font='3px "Press Start 2P"';
      ctx.fillText('"...Você me venceu pela experiência."',W/2,H/2-30);
      ctx.fillStyle='#c0a050';ctx.font='4px "Press Start 2P"';
      ctx.fillText('Stand TABULA RASA se dissolve.',W/2,H/2-16);
      ctx.fillStyle='#806030';ctx.font='3px "Press Start 2P"';
      ctx.fillText('— John Berkujoh recua.',W/2,H/2-2);
    }
    // Fase 2: Resposta à pergunta do Stand
    if(t>2.6){
      const ta2=Math.min(1,(t-2.6)/.9);ctx.globalAlpha=ta*ta2;
      ctx.fillStyle='rgba(5,3,10,.72)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#f0e070';ctx.font='7px "Press Start 2P"';
      ctx.fillText('ARE YOU',W/2,H/2-28);ctx.fillText('EXPERIENCED?',W/2,H/2-12);
      ctx.fillStyle='#c8a840';ctx.font='4px "Press Start 2P"';
      ctx.fillText('Sim. Agora sou.',W/2,H/2+4);
    }
    // Fase 3: Síntese empírica
    if(t>4.0){
      const ta3=Math.min(1,(t-4.0)*.8);ctx.globalAlpha=ta*ta3;
      ctx.fillStyle='#d0c880';ctx.font='3px "Press Start 2P"';
      ctx.fillText('Bacon limpou sua visão.',W/2,H/2+20);
      ctx.fillText('Locke organizou sua mente.',W/2,H/2+30);
      ctx.fillText('Hume desfez suas ilusões de certeza.',W/2,H/2+40);
    }
    // Fase 4: Parabéns
    if(t>5.6){
      const ta4=Math.min(1,(t-5.6)*.9);ctx.globalAlpha=ta*ta4;
      ctx.fillStyle='#f0e060';ctx.font='6px "Press Start 2P"';ctx.fillText('PARABÉNS!',W/2,H/2+58);
      ctx.fillStyle='#b09840';ctx.font='4px "Press Start 2P"';
      ctx.fillText('A Cruzada Sensorial concluída.',W/2,H/2+70);
    }
    // Fase 5: Gancho Stage 3
    if(t>7.4){
      const ta5=Math.min(1,(t-7.4)*.6);ctx.globalAlpha=ta*ta5;
      ctx.fillStyle='#706028';ctx.font='3px "Press Start 2P"';
      ctx.fillText('Mas uma pergunta persiste...',W/2,H/2+86);
      ctx.fillText('Se o conhecimento vem da experiência,',W/2,H/2+96);
      ctx.fillText('o que a ciência pode afirmar com certeza?',W/2,H/2+106);
      ctx.fillStyle='#504018';ctx.font='3px "Press Start 2P"';
      ctx.fillText('Uma silhueta aparece no horizonte.',W/2,H/2+118);
      ctx.fillText('O Calvinista de Königsberg.  [To be continued]',W/2,H/2+128);
    }
    if(t>9.4){
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(5,3,10,.92)';ctx.fillRect(0,H-26,W,26);
      if(S.frame%30<20){
        ctx.fillStyle='#f0e060';ctx.font='4px "Press Start 2P"';
        ctx.fillText('ENTER → seguir para O Calvinista',W/2,H-10);
      }
    }
    ctx.globalAlpha=1;ctx.textAlign='left';
  }
}

// ── LOOP ──────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-(S.lastT||ts))/1000,.05);
  S.lastT=ts;update(dt);render();requestAnimationFrame(loop);
}
document.fonts.ready.then(()=>requestAnimationFrame(loop));
</script>
</body>
</html>
