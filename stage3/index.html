// ── MIDI — Schütz, 3.6 min, 5 vozes, parser nativo Web Audio ──────
const MIDI_VOL=0.25;   // volume relativo ao ambient (ajustável)
let _midiNotes=null,_midiDur=0;

function parseMidi(b64){
  const raw=atob(b64),d=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)d[i]=raw.charCodeAt(i);
  const div=(d[12]<<8)|d[13];
  function vl(d,p){let v=0;while(true){const b=d[p++];v=(v<<7)|(b&0x7F);if(!(b&0x80))break;}return[v,p];}
  // Extrair tracks
  const tracks=[];let pos=14;
  while(pos<d.length){
    if(d[pos]===0x4D&&d[pos+1]===0x54&&d[pos+2]===0x72&&d[pos+3]===0x6B){
      const tl=(d[pos+4]<<24)|(d[pos+5]<<16)|(d[pos+6]<<8)|d[pos+7];
      tracks.push(d.slice(pos+8,pos+8+tl));pos+=8+tl;
    }else pos++;
  }
  // Tempo map (track 0)
  const tmap=[[0,500000]];
  {const t=tracks[0];let p=0,tk=0;
   while(p<t.length){let[dl,p2]=vl(t,p);p=p2;tk+=dl;if(p>=t.length)break;
     const b=t[p];
     if(b===0xFF){p++;const mt=t[p++];let[ml,p3]=vl(t,p);p=p3;
       if(mt===0x51&&ml===3)tmap.push([tk,(t[p]<<16)|(t[p+1]<<8)|t[p+2]]);
       p+=ml;}else if(b&0x80)p++;}}
  // Tick → segundos com mapa de tempo
  function t2s(tk){
    let s=0,pt=0,ptp=tmap[0][1];
    for(let i=1;i<tmap.length;i++){const[mt,mtp]=tmap[i];
      if(tk<=mt)break;s+=(Math.min(tk,mt)-pt)*ptp/1e6/div;pt=mt;ptp=mtp;}
    return s+(tk-pt)*ptp/1e6/div;
  }
  // Extrair notas de todas as tracks musicais
  const notes=[];
  for(let ti=1;ti<tracks.length;ti++){
    const t=tracks[ti];let p=0,tk=0,ls=0;const pend={};
    while(p<t.length){
      let[dl,p2]=vl(t,p);p=p2;tk+=dl;if(p>=t.length)break;
      let b=t[p];
      if(b===0xFF){p++;const mt=t[p++];let[ml,p3]=vl(t,p);p=p3+ml;}
      else if(b===0xF0||b===0xF7){p++;let[sl,p3]=vl(t,p);p=p3+sl;}
      else{
        if(b&0x80){ls=b;p++;}else b=ls;
        const cmd=b&0xF0,ch=b&0x0F;
        if(cmd===0x90){
          const pitch=t[p],vel=t[p+1];p+=2;const k=(ch<<7)|pitch;
          if(vel>0)pend[k]=[tk,vel];
          else if(pend[k]){const[st,v]=pend[k];delete pend[k];
            notes.push([t2s(st),440*2**((pitch-69)/12),Math.max(0.05,t2s(tk)-t2s(st)),v/127]);}
        }else if(cmd===0x80){
          const pitch=t[p];p+=2;const k=(ch<<7)|pitch;
          if(pend[k]){const[st,v]=pend[k];delete pend[k];
            notes.push([t2s(st),440*2**((pitch-69)/12),Math.max(0.05,t2s(tk)-t2s(st)),v/127]);}
        }else if(cmd===0xA0||cmd===0xB0||cmd===0xE0)p+=2;
        else if(cmd===0xC0||cmd===0xD0)p+=1;
      }
    }
  }
  return notes.sort((a,b)=>a[0]-b[0]);
}

function startMidi(){
  if(!AC||!_midiNotes)return;
  const now=AC.currentTime;
  _midiNotes.forEach(([t,freq,dur,vel])=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(0,now+t);
    g.gain.linearRampToValueAtTime(vel*MIDI_VOL,now+t+0.04);
    g.gain.setValueAtTime(vel*MIDI_VOL,now+t+dur*0.85);
    g.gain.linearRampToValueAtTime(0,now+t+dur);
    o.connect(g);g.connect(revIn);
    o.start(now+t);o.stop(now+t+dur+0.06);
  });
  setTimeout(startMidi,(_midiDur+1.5)*1000);
}

// ── ÁUDIO ──────────────────────────────────────────────────────────
let AC=null,revIn=null;
function initAudio(){
  if(AC)return;
  try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    setupReverb();
    if(!_midiNotes){_midiNotes=parseMidi(MIDI_B64);_midiDur=_midiNotes.reduce((mx,[t,,d])=>Math.max(mx,t+d),0);}
    setTimeout(startMidi,600);
  }catch(e){AC=null;}
}
function setupReverb(){
  if(!AC||revIn)return;
  const wet=AC.createGain();wet.gain.value=.22;wet.connect(AC.destination);
  revIn=AC.createGain();revIn.gain.value=1;
  [.071,.093,.119].forEach((d,i)=>{
    const dl=AC.createDelay(.5),fb=AC.createGain();
    dl.delayTime.value=d;fb.gain.value=.18-.02*i;
    revIn.connect(dl);dl.connect(fb);fb.connect(dl);dl.connect(wet);
  });
}
function fm(cFreq,mRatio,idx,delay,dur,vol,noRev){
  if(!AC)return;
  const t=AC.currentTime+delay;
  const c=AC.createOscillator(),m=AC.createOscillator();
  const mG=AC.createGain(),env=AC.createGain();
  c.type=m.type='sine';
  c.frequency.value=cFreq;m.frequency.value=cFreq*mRatio;mG.gain.value=cFreq*idx;
  m.connect(mG);mG.connect(c.frequency);c.connect(env);
  env.connect(AC.destination);
  if(!noRev&&revIn)env.connect(revIn);
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(vol,t+.015);
  env.gain.exponentialRampToValueAtTime(vol*.7,t+.08);
  env.gain.setValueAtTime(vol*.7,t+Math.max(dur-.12,t+.09));
  env.gain.linearRampToValueAtTime(.0001,t+dur);
  m.start(t);c.start(t);m.stop(t+dur+.02);c.stop(t+dur+.02);
}
function warm(freq,delay,dur,vol){
  if(!AC)return;
  const t=AC.currentTime+delay;
  const o=AC.createOscillator(),lfo=AC.createOscillator();
  const lG=AC.createGain(),env=AC.createGain();
  o.type='triangle';lfo.frequency.value=4.5;lG.gain.value=freq*.006;
  lfo.connect(lG);lG.connect(o.frequency);o.frequency.value=freq;
  o.connect(env);env.connect(AC.destination);if(revIn)env.connect(revIn);
  env.gain.setValueAtTime(0,t);
  env.gain.linearRampToValueAtTime(vol,t+.06);
  env.gain.setValueAtTime(vol*.75,t+.25);
  env.gain.setValueAtTime(vol*.75,t+Math.max(dur-.18,t+.26));
  env.gain.linearRampToValueAtTime(.0001,t+dur);
  lfo.start(t);o.start(t);lfo.stop(t+dur);o.stop(t+dur);
}
function playStep(){
  if(!AC)return;
  const t=AC.currentTime;
  const o=AC.createOscillator(),env=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(140,t);
  o.frequency.exponentialRampToValueAtTime(45,t+.06);
  o.connect(env);env.connect(AC.destination);
  env.gain.setValueAtTime(.12,t);
  env.gain.exponentialRampToValueAtTime(.001,t+.09);
  o.start(t);o.stop(t+.1);
}
function playSuccess(){
  [[330,.0],[415,.13],[523,.26],[659,.4]].forEach(([f,d])=>fm(f,14,1,d,.38,.14));

function playWrong(){

function playFanfare(){
  [[262,330,392,.0],[330,415,523,.22],[392,494,659,.44],[523,659,784,.66]]
    .forEach(([a,b,c2,d])=>{

function startAmbient(){

    [[73.4,0.00,2.0,.082],[110.0,2.05,2.0,.074],

     [261,5.55,0.95,.050],[220,6.50,0.90,.046]].forEach(([f,d,du,v])=>warm(f,d,du,v));
    // Linha de tenor (quinta abaixo — suporte harmônico)

function tileAt(col,row){
  if(col<0||col>=MC||row<0||row>=MR)return WALL;
  return MAP[row][col];
}
function solid(t){
  return t===WALL||t===DOOR||t===VOID||
         t===T_TB||t===T_KT||
         t===T_TELE||t===T_RELO||t===T_PRIS||
         t===T_CP1||t===T_CP2||t===T_CP3||t===T_CALV;
}
function canGo(x,y){
  const hw=4,hh=6,f=n=>Math.floor(n/T);
  return!solid(tileAt(f(x-hw),f(y-hh)))&&!solid(tileAt(f(x+hw),f(y-hh)))&&
         !solid(tileAt(f(x-hw),f(y+hh)))&&!solid(tileAt(f(x+hw),f(y+hh)));
}
function camSync(){
  S.cx=Math.max(0,Math.min(MC*T-W,Math.round(S.px-W/2)));
  S.cy=Math.max(0,Math.min(MR*T-H,Math.round(S.py-H/2)));
}
function nearObj(){
  const pc=Math.floor(S.px/T),pr=Math.floor(S.py/T);
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const r=pr+dr,c=pc+dc;
    if(r<0||r>=MR||c<0||c>=MC)continue;
    const t=MAP[r][c];
    if(S.progress===0){
      if(t===T_TB)return'tablet_'+r+'_'+c;
      if(t===T_KT)return'kant_table';
    }
    if(S.progress===1){
      if(t===T_TELE&&!S.instrCompleted[0])return'kant_tele';
      if(t===T_RELO&&!S.instrCompleted[1])return'kant_relo';
      if(t===T_PRIS&&!S.instrCompleted[2])return'kant_pris';
    }
    if(S.progress===2){
      if(t===T_CP1&&!S.copernCompleted[0])return'copern_0';
      if(t===T_CP2&&!S.copernCompleted[1])return'copern_1';
      if(t===T_CP3&&!S.copernCompleted[2])return'copern_2';
    }
  }
  return null;
}

function openDlg(key){
  if(key.startsWith('tablet_')){

    const tk=parts[0]+'_'+parts[1];
    const tb=KANT_TABLETS[tk];
    if(!tb)return;
    S.tabletKey=tk;S.dKey='tablet';
    S.dNarrative=['[ '+tb.name+' ]',...tb.desc];
    S.dQuestion='Marcar como Sintético a Priori?';
    const isSel=S.kantSelected.has(tk);
    S.dOpts=[isSel?'1. Remover marca':'1. Marcar como Sintético a Priori','2. Ignorar'];
    S.dSel=0;
  } else if(key==='kant_table'){
    if(S.kantSelected.size<3){
      S.okMsg=['Marque mais '+(3-S.kantSelected.size)+' juízo(s).','Use [E] nas tábuas de pedra.'];
      S.okT=5.0;return;
    }
    const names=[...S.kantSelected].map(k=>KANT_TABLETS[k].name);
    S.dKey='kant_table';
    S.dNarrative=['Sua seleção:',...names.map(n=>'  '+n),'','Confirmar estes 3 juízos?'];
    S.dQuestion='São os Sintéticos a Priori de Kant?';
    S.dOpts=['1. Confirmar seleção','2. Cancelar'];
    S.dSel=0;
  } else if(key==='kant_tele'||key==='kant_relo'||key==='kant_pris'){
    const im={'kant_tele':0,'kant_relo':1,'kant_pris':2};
    const si=im[key];
    const ins=KANT_INSTR[si];
    S.instrIdx=si;S.dKey=key;
    S.dNarrative=ins.intro;
    S.dQuestion=ins.q;
    S.dOpts=ins.opts;S.dSel=0;

    const si=parseInt(key.slice(7));

}

// ── DIÁLOGO: ESCOLHA ───────────────────────────────────────────────
function pickOpt(idx){
  if(idx>=S.dOpts.length)return;

  // — Tábua —
  if(S.dKey==='tablet'){
    const tk=S.tabletKey;
    if(idx===0){
      if(S.kantSelected.has(tk)){
        S.kantSelected.delete(tk);
      } else {
        if(S.kantSelected.size<3)S.kantSelected.add(tk);
        else{S.okMsg=['Já marcou 3.','Desmarque um antes de marcar outro.'];S.okT=5.0;}
      }
    }
    S.scene='playing';S.dKey=null;return;
  }

  // — Mesa de confirmação —
  if(S.dKey==='kant_table'){
    if(idx===0){
      const isOk=[...S.kantSelected].every(k=>CORRECT_TABLETS.has(k))&&S.kantSelected.size===3;
      if(isOk){
        playSuccess();
        S.progress=1;
        DR1.forEach(([r,c])=>MAP[r][c]=FLOOR);
        S.okMsg=['Juízos Sintéticos a Priori identificados!',
                 'Necessários E informativos.',
                 'Corredor A aberto — avance.'];
        S.okT=8.0;
      } else {
        playWrong();
        S.kantSelected=new Set();
        S.calvinistMsg=['Ainda confunde o analítico com o sintético.',
                        'Suas marcas foram removidas.',
                        'Revise as tábuas.'];
        S.calvinistT=8.0;
        S.okMsg=['Seleção incorreta.','Tente novamente.'];S.okT=4.5;
      }
    }
    S.scene='playing';S.dKey=null;return;
  }

  // — Instrumento (bloqueia no erro) —
  if(S.dKey==='kant_tele'||S.dKey==='kant_relo'||S.dKey==='kant_pris'){
    const ins=KANT_INSTR[S.instrIdx];
    if(idx===ins.ok){
      playSuccess();
      S.instrCompleted[S.instrIdx]=true;
      const allDone=S.instrCompleted.every(c=>c);
      if(allDone){
        S.progress=2;
        DR2.forEach(([r,c])=>MAP[r][c]=FLOOR);
        S.calvinistMsg=['...Você está reestruturando','tudo que aprendi.'];
        S.calvinistT=7.0;
        S.okMsg=['Observatório concluído.','Espaço e tempo: formas da intuição.','Sala da Crítica aberta.'];
        S.okT=8.0;
      } else {
        const rem=3-S.instrCompleted.filter(c=>c).length;
        S.okMsg=['Correto — '+ins.name+'.',rem+' instrumento(s) restante(s).'];S.okT=5.5;
      }
      S.scene='playing';
    } else {
      playWrong();
      const fb=ins.fbs[idx];
      S.calvinistMsg=fb||['Incorreto. Reflita.'];
      S.calvinistT=9.0;
      S.scene='playing'; // instrumento ainda disponível para retry
    }
    S.dKey=null;return;
  }

  // — Cenário Copernicano —
  if(S.dKey==='copern'){
    const sc=KANT_SCEN[S.copernIdx];
    if(idx===sc.ok){
      playSuccess();
      S.copernCompleted[S.copernIdx]=true;
      const allDone=S.copernCompleted.every(c=>c);
      if(allDone){
        setTimeout(playFanfare,400);
        S.calvinistMsg=[
          'A inversão está completa.',
          'Não nos adaptamos ao mundo.',
          'É o sujeito que constitui o objeto.',
          'A razão não descreve — ela legisla.',
          'O cogito kantiano desperta.',
        ];
        S.calvinistT=16.0;
        S.okMsg=['Revolução Copernicana concluída.','Missão III encerrada.'];
        S.okT=14.0;
        S.progress=3;
        S.pendingEpiphany=true;
        S.scene='playing';
      } else {
        const rem=3-S.copernCompleted.filter(c=>c).length;
        S.okMsg=['Correto — '+sc.name+'.',rem+' cenário(s) restante(s).'];S.okT=5.5;
        S.scene='playing';
      }
    } else {
      playWrong();
      const fb=sc.fbs[idx];
      S.calvinistMsg=fb||['Incorreto. Reflita.'];
      S.calvinistT=8.5;
      S.scene='playing';
    }
    S.dKey=null;return;
  }
}

function update(dt){
  S.frame++;S.mf=(S.mf+dt)%1.4;
  if(S.okT>0)S.okT-=dt;
  if(S.calvinistT>0)S.calvinistT-=dt;
  if(S.pendingEpiphany&&S.okT<=0&&S.calvinistT<=0){
    S.pendingEpiphany=false;S.scene='epiphany';S.epT=0;
  }
  if(S.sectorLabelT>0)S.sectorLabelT-=dt;

  if(S.scene==='menu'){
    if(KP.Enter||KP.Space){S.scene='intro';S.introIdx=0;}
    if(KP.Escape)location.href='../index.html';
  }
  else if(S.scene==='intro'){
    S.charAccum+=dt*26;
    const adv=~~S.charAccum;S.charAccum-=adv;
    S.introIdx=Math.min(INTRO_TOTAL,S.introIdx+adv);
    if(KP.Enter||KP.Space){
      if(S.introIdx<INTRO_TOTAL)S.introIdx=INTRO_TOTAL;
      else S.scene='playing';
    }
  }
  else if(S.scene==='playing'){
    let dx=0,dy=0;
    if(K.ArrowLeft||K.KeyA){dx=-1;S.face=3;}
    if(K.ArrowRight||K.KeyD){dx=1;S.face=1;}
    if(K.ArrowUp||K.KeyW){dy=-1;S.face=0;}
    if(K.ArrowDown||K.KeyS){dy=1;S.face=2;}
    if(dx&&dy){dx*=.707;dy*=.707;}
    S.moving=dx!==0||dy!==0;
    const sp=58*dt;
    const nx=S.px+dx*sp,ny=S.py+dy*sp;
    if(canGo(nx,ny)){S.px=nx;S.py=ny;}
    else if(canGo(nx,S.py))S.px=nx;
    else if(canGo(S.px,ny))S.py=ny;
    S.px=Math.max(8,Math.min(MC*T-8,S.px));
    S.py=Math.max(8,Math.min(MR*T-8,S.py));
    if(S.moving){
      S.pft+=dt;
      if(S.pft>.35){S.pft=0;S.pf^=1;}
      if(S.pf!==S.prevPf){playStep();S.prevPf=S.pf;}
    } else {S.pf=0;S.pft=0;S.prevPf=-1;}
    camSync();
    const pr=Math.floor(S.py/T);
    const sec=pr<14?0:pr<26?1:2;
    if(sec!==S.lastSector){
      S.lastSector=sec;
      const lb=['I — Biblioteca Crítica','II — Observatório','III — Sala da Crítica'];
      S.sectorLabel=lb[sec];S.sectorLabelT=2.8;
      if(sec===1&&!S.sectIITriggered&&S.progress===1){
        S.sectIITriggered=true;
        S.calvinistMsg=[
          'Os juízos estão identificados.',
          'Mas de onde eles vêm?',
          'A geometria é Sintética a Priori',
          'porque o espaço é a FORMA',
          'da experiência — não seu conteúdo.',
          'Examine esses instrumentos.',
        ];
        S.calvinistT=12.0;
      }
      if(sec===2&&!S.sectIIITriggered&&S.progress===2){
        S.sectIIITriggered=true;
        S.calvinistMsg=[
          'Muito bem. Mas ainda não respondeu:',
          'por que os objetos obedecem às leis?',
          'Kant: é o sujeito que estrutura.',
          'Mas isso não seria idealismo?',
          'Vamos ver se você entende a inversão.',
        ];
        S.calvinistT=12.0;
      }
    }
    if(KP.Enter&&(S.okT>0||S.calvinistT>0)){S.okT=0;S.calvinistT=0;}
    else if(KP.KeyE||KP.Space||KP.Enter){const o=nearObj();if(o)openDlg(o);}
  }
  else if(S.scene==='dialogue'){
    if(S.dPhase==='typing'){
      if(KP.Space||KP.Enter){S.dIdx=S.dTotal;S.charAccum=0;}
      else{S.charAccum+=dt*26;const adv=~~S.charAccum;S.charAccum-=adv;S.dIdx=Math.min(S.dTotal,S.dIdx+adv);}
      if(S.dIdx>=S.dTotal){S.dPhase='waiting';S.charAccum=0;}
    }
    else if(S.dPhase==='waiting'){
      if(KP.Enter||KP.Space)S.dPhase='choosing';
    }
    else if(S.dPhase==='choosing'){
      if(KP.ArrowUp||KP.KeyW)S.dSel=Math.max(0,S.dSel-1);
      if(KP.ArrowDown||KP.KeyS)S.dSel=Math.min(S.dOpts.length-1,S.dSel+1);
      if(KP.Digit1)pickOpt(0);
      if(KP.Digit2)pickOpt(1);
      if(KP.Digit3)pickOpt(2);
      if(KP.Enter||KP.Space)pickOpt(S.dSel);
    }
  }
  else if(S.scene==='gameover'){
    if(KP.Enter||KP.Space){respawn();S.scene='playing';}
  }
  else if(S.scene==='epiphany'){
    S.epT+=dt;
    if(S.epT>9.6&&(KP.Enter||KP.Space)){
      vmComplete('stage3');
      location.href='../final.html';
    }
  }

  for(const k in KP)delete KP[k];
}

// ── TILES ──────────────────────────────────────────────────────────
function rTiles(){
  const cx=S.cx,cy=S.cy;
  const c0=Math.max(0,~~(cx/T)),c1=Math.min(MC,~~((cx+W)/T)+2);
  const r0=Math.max(0,~~(cy/T)),r1=Math.min(MR,~~((cy+H)/T)+2);
  for(let r=r0;r<r1;r++)for(let c=c0;c<c1;c++)
    drawTile(c*T-cx,r*T-cy,MAP[r][c],c,r);
}
function drawTile(sx,sy,tp,c,r){
  const n=S.frame;
  switch(tp){
    case VOID:
      ctx.fillStyle='#030408';ctx.fillRect(sx,sy,T,T);break;
    case FLOOR:
      drawSpr(FL_TILE,TPAL,sx,sy,1);break;
    case WALL:
      drawSpr(WL_TILE,TPAL,sx,sy,1);break;
    case DOOR:
      drawSpr(DR_TILE,TPAL,sx,sy,1);break;
    case T_TB:{
      const tk=r+'_'+c;
      const isSel=S.kantSelected.has(tk);
      drawSpr(TB_TILE,TPAL,sx,sy,1);
      if(isSel){
        const gv=.65+Math.sin(n*.09)*.35;
        ctx.fillStyle=`rgba(192,168,48,${gv*.35})`;ctx.fillRect(sx+2,sy+2,T-4,T-4);
        ctx.fillStyle=`rgba(192,168,48,${gv})`;
        ctx.fillRect(sx+4,sy+3,8,1);ctx.fillRect(sx+4,sy+6,8,1);ctx.fillRect(sx+4,sy+9,6,1);
        ctx.fillRect(sx+5,sy+4,2,2);ctx.fillRect(sx+9,sy+7,2,2);
      }
      break;
    }
    case T_KT:{
      drawSpr(KT_TILE,TPAL,sx,sy,1);
      if(S.kantSelected.size===3&&S.progress===0){
        const gv=.55+Math.sin(n*.1)*.45;
        ctx.fillStyle=`rgba(192,168,48,${gv*.5})`;ctx.fillRect(sx,sy,T,T);
        ctx.fillStyle=`rgba(192,168,48,${gv})`;
        ctx.fillRect(sx,sy,T,1);ctx.fillRect(sx,sy+T-1,T,1);
        ctx.fillRect(sx,sy,1,T);ctx.fillRect(sx+T-1,sy,1,T);
      }
      break;
    }
    case T_TELE:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(TELE_TILE,TPAL,sx,sy,1);
      const gl=.5+Math.sin(n*.12)*.5;
      ctx.fillStyle=`rgba(160,200,255,${gl*.85})`;ctx.fillRect(sx+11,sy+3,2,1);
      if(!S.instrCompleted[0]&&S.progress===1){
        ctx.fillStyle=`rgba(80,130,220,${.14+Math.sin(n*.07)*.09})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-4);
      }
      break;
    }
    case T_RELO:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(RELO_TILE,TPAL,sx,sy,1);
      if(!S.instrCompleted[1]&&S.progress===1){
        ctx.fillStyle=`rgba(110,90,210,${.14+Math.sin(n*.07+1)*.09})`;
        ctx.fillRect(sx+2,sy+1,T-4,T-4);
      }
      break;
    }
    case T_PRIS:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(PRIS_TILE,TPAL,sx,sy,1);
      const t2=n*.06;
      ctx.fillStyle=`rgba(80,160,255,${.55+Math.sin(t2)*.3})`;ctx.fillRect(sx+13,sy+4,2,1);
      ctx.fillStyle=`rgba(160,80,255,${.45+Math.sin(t2+1)*.3})`;ctx.fillRect(sx+13,sy+6,2,1);
      ctx.fillStyle=`rgba(80,220,200,${.40+Math.sin(t2+2)*.3})`;ctx.fillRect(sx+13,sy+8,2,1);
      if(!S.instrCompleted[2]&&S.progress===1){
        ctx.fillStyle=`rgba(60,140,200,${.14+Math.sin(n*.07+2)*.09})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
    case T_CP1:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(CP1_TILE,TPAL,sx,sy,1);
      const gv=.55+Math.sin(n*.09)*.45;
      ctx.fillStyle=`rgba(200,160,40,${gv})`;ctx.fillRect(sx+7,sy+5,2,2);
      if(!S.copernCompleted[0]&&S.progress===2){
        ctx.fillStyle=`rgba(120,90,200,${.16+Math.sin(n*.07)*.09})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
    case T_CP2:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(CP2_TILE,TPAL,sx,sy,1);
      const gv2=.55+Math.sin(n*.1)*.45;
      ctx.fillStyle=`rgba(192,168,48,${gv2})`;ctx.fillRect(sx+7,sy+5,2,2);
      if(!S.copernCompleted[1]&&S.progress===2){
        ctx.fillStyle=`rgba(60,110,210,${.16+Math.sin(n*.07+1)*.09})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
    case T_CP3:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(CP3_TILE,TPAL,sx,sy,1);
      const ph=n*.07;
      ctx.fillStyle=`rgba(50,70,140,${.28+Math.sin(ph)*.18})`;
      ctx.fillRect(sx+9,sy+3,5,5);
      if(!S.copernCompleted[2]&&S.progress===2){
        ctx.fillStyle=`rgba(90,70,200,${.16+Math.sin(n*.07+2)*.09})`;
        ctx.fillRect(sx+1,sy+1,T-2,T-5);
      }
      break;
    }
    case T_CALV:{
      drawSpr(FL_TILE,TPAL,sx,sy,1);drawSpr(CALV_TILE,TPAL,sx,sy,1);
      const av=.26+Math.sin(n*.05)*.16;
      ctx.fillStyle=`rgba(70,100,200,${av*.45})`;ctx.fillRect(sx+1,sy+1,T-2,T-2);
      ctx.fillStyle=`rgba(70,100,200,${av})`;
      ctx.fillRect(sx+1,sy,T-2,1);ctx.fillRect(sx+1,sy+T-1,T-2,1);
      ctx.fillRect(sx,sy+1,1,T-2);ctx.fillRect(sx+T-1,sy+1,1,T-2);
      break;
    }
  }
}

function drawSpr(rows,pal,x,y,sc,fl){
  const W=rows[0].length;
  rows.forEach((row,j)=>[...row].forEach((ch,i)=>{
    if(!pal[ch])return;
    ctx.fillStyle=pal[ch];
    ctx.fillRect(x+(fl?W-1-i:i)*sc,y+j*sc,sc,sc);
  }));
}

// ── A APRENDIZ — 16×24 px · longilínea · 4 direções ──────────────
function rPlayer(){
  const sx=~~(S.px-S.cx),sy=~~(S.py-S.cy);
  let rows,fl=false;
  if(S.face===0)rows=S.pf?PB1:PB0;
  else if(S.face===2)rows=S.pf?PF1:PF0;
  else{rows=S.pf?PS1:PS0;if(S.face===3)fl=true;}
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.fillRect(sx-6,sy,13,2);ctx.fillRect(sx-5,sy+1,11,1);
  drawSpr(rows,PPAL,sx-8,sy-23,1,fl);
  if(S.progress===3||S.scene==='epiphany'){
    ctx.fillStyle='rgba(200,160,40,.70)';
    [
      [sx+~~(Math.sin(S.frame*.08)*7),sy-6+~~(Math.cos(S.frame*.10)*4)],
      [sx-4+~~(Math.sin(S.frame*.12+1)*5),sy-13+~~(Math.cos(S.frame*.07+2)*3)],
      [sx+6+~~(Math.sin(S.frame*.06+3)*4),sy-3+~~(Math.cos(S.frame*.09+1)*4)],
      [sx-1+~~(Math.sin(S.frame*.10+4)*5),sy+2+~~(Math.cos(S.frame*.11+3)*3)],
    ].forEach(([px,py])=>ctx.fillRect(px,py,1,1));
  }
}


// ── ILUMINAÇÃO ─────────────────────────────────────────────────────
function rLight(){
  lx.setTransform(2,0,0,2,0,0);
  lx.clearRect(0,0,W,H);
  lx.fillStyle='rgba(0,0,0,.38)';lx.fillRect(0,0,W,H);
  lx.globalCompositeOperation='destination-out';
  const px=~~(S.px-S.cx),py=~~(S.py-S.cy);
  // Luz da personagem — azul-fria (razão crítica, não torcha âmbar)
  const g=lx.createRadialGradient(px,py-4,2,px,py-4,80);
  g.addColorStop(0,'rgba(215,230,255,1)');
  g.addColorStop(.30,'rgba(145,175,255,.70)');
  g.addColorStop(.65,'rgba(75,105,200,.26)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  lx.fillStyle=g;lx.beginPath();lx.arc(px,py-4,80,0,Math.PI*2);lx.fill();
  // Setor I: tábuas marcadas → dourado; mesa pulsa se 3 marcadas
  if(S.progress===0){
    for(const tk of S.kantSelected){
      const[rr,cc]=tk.split('_').map(Number);
      addGlowAt(cc*T+8-S.cx,rr*T+8-S.cy,16,200,160,40);
    }
    if(S.kantSelected.size===3)addGlowAt(24*T+8-S.cx,5*T+8-S.cy,22,200,160,40);
  }
  // Setor II: instrumentos incompletos → brilhos frios
  if(S.progress===1){
    if(!S.instrCompleted[0])addGlowAt(5*T+8-S.cx,16*T+8-S.cy,18,70,120,225);
    if(!S.instrCompleted[1])addGlowAt(15*T+8-S.cx,18*T+8-S.cy,18,130,155,210);
    if(!S.instrCompleted[2])addGlowAt(23*T+8-S.cx,20*T+8-S.cy,18,110,75,225);
  }
  // Setor III: aura do Calvinista + cenários
  if(S.progress===2){
    addGlowAt(16*T+8-S.cx,27*T+8-S.cy,30,55,75,180);
    if(!S.copernCompleted[0])addGlowAt(6*T+8-S.cx,30*T+8-S.cy,18,130,85,210);
    if(!S.copernCompleted[1])addGlowAt(14*T+8-S.cx,30*T+8-S.cy,18,75,110,220);
    if(!S.copernCompleted[2])addGlowAt(22*T+8-S.cx,30*T+8-S.cy,18,100,70,200);
  }
  lx.globalCompositeOperation='source-over';
  ctx.drawImage(lc,0,0,W,H);
}
function addGlowAt(ox,oy,rad,cr,cg,cb){
  if(ox<-50||ox>W+50||oy<-50||oy>H+50)return;
  const fl=.92+Math.sin(S.frame*.18)*.08,r=rad*fl;
  const g=lx.createRadialGradient(ox,oy,0,ox,oy,r);
  g.addColorStop(0,`rgba(${cr},${cg},${cb},.72)`);g.addColorStop(1,'rgba(0,0,0,0)');
  lx.fillStyle=g;lx.beginPath();lx.arc(ox,oy,r,0,Math.PI*2);lx.fill();
}

// ── DICA ───────────────────────────────────────────────────────────

  const o=nearObj();

  ctx.fillText(hint,px,py-16);ctx.textAlign='left';

// ── OK MESSAGE ─────────────────────────────────────────────────────
function rOkMsg(){
  const a=Math.min(1,S.okT*2.5);
  ctx.save();ctx.globalAlpha=a;
  const bW=220,bH=S.okMsg.length*12+26;
  const bx=W/2-bW/2,by=H/2-bH/2;
  ctx.fillStyle='rgba(4,6,18,.97)';ctx.fillRect(bx,by,bW,bH);
  ctx.strokeStyle='#5070a0';ctx.lineWidth=1;ctx.strokeRect(bx,by,bW,bH);
  ctx.fillStyle='#c0d0e8';ctx.font='4px "Press Start 2P"';ctx.textAlign='center';
  S.okMsg.forEach((l,i)=>ctx.fillText(l,W/2,by+13+i*11));
  ctx.fillStyle='rgba(60,80,140,.65)';ctx.font='3px "Press Start 2P"';
  ctx.fillText('[ENTER] dispensar',W/2,by+bH-6);
  ctx.textAlign='left';ctx.restore();
}

// ── DIÁLOGO ────────────────────────────────────────────────────────
function rDlg(){
  const bH=92,bY=H-bH-2,pX=7,lH=9;
  ctx.fillStyle='rgba(4,6,18,.98)';ctx.fillRect(2,bY,W-4,bH);
  ctx.strokeStyle='#4060a0';ctx.lineWidth=1;ctx.strokeRect(2,bY,W-4,bH);
  ctx.strokeStyle='#20304a';ctx.strokeRect(3,bY+1,W-6,bH-2);
  ctx.fillStyle='#5070a8';
  [[2,bY],[W-5,bY],[2,bY+bH-3],[W-5,bY+bH-3]].forEach(([x,y])=>ctx.fillRect(x,y,3,3));
  const hdrs={
    tablet:'Biblioteca Crítica',
    kant_table:'Mesa de Kant',
    kant_tele:'Observatório — Telescópio',
    kant_relo:'Observatório — Relógio',
    kant_pris:'Observatório — Prisma',
    copern:'Sala da Crítica — Cenário '+['I','II','III'][S.copernIdx],
  };
  ctx.fillStyle='#5070a8';ctx.font='3px "Press Start 2P"';
  ctx.textAlign='right';ctx.fillText(hdrs[S.dKey]||'',W-8,bY+7);ctx.textAlign='left';
  ctx.fillStyle='#20304a';ctx.fillRect(2,bY+9,W-4,1);
  ctx.font='4px "Press Start 2P"';

  if(S.dPhase==='typing'||S.dPhase==='waiting'){
    ctx.fillStyle='#c0d0e8';
    let rem=S.dPhase==='waiting'?999999:S.dIdx,ly=bY+pX+8;
    for(const line of S.dNarrative){
      if(rem<=0)break;
      if(line===''){rem-=1;ly+=5;continue;}
      ctx.fillText(line.substring(0,Math.min(rem,line.length)),pX+2,ly);
      rem-=line.length;ly+=lH;
      if(ly>bY+bH-16)break;
    }
    if(S.dPhase==='waiting'){
      if(S.frame%28<16){
        ctx.fillStyle='#c0a830';ctx.textAlign='center';
        ctx.fillText('[ ENTER para responder ]',W/2,bY+bH-6);
        ctx.textAlign='left';
      }
    } else {
      ctx.fillStyle='#203048';ctx.font='3px "Press Start 2P"';
      ctx.textAlign='right';ctx.fillText('[ESPACO p/ pular]',W-7,bY+bH-6);ctx.textAlign='left';
    }
  }
  else if(S.dPhase==='choosing'){
    ctx.fillStyle='#c0a830';ctx.font='4px "Press Start 2P"';
    ctx.fillText(S.dQuestion,pX+2,bY+pX+8);
    ctx.fillStyle='#203048';ctx.fillRect(pX,bY+pX+11,W-pX*2-4,1);
    S.dOpts.forEach((opt,i)=>{
      const ly=bY+pX+20+i*18;const sel=i===S.dSel;
      if(sel){ctx.fillStyle='#1a2848';ctx.fillRect(3,ly-7,W-6,14);}
      ctx.fillStyle=sel?'#d0e0f8':'#7080a0';
      if(sel)ctx.fillText('>',pX+1,ly);
      ctx.fillText(opt,pX+8,ly);
    });
    ctx.fillStyle='#203048';ctx.font='3px "Press Start 2P"';
    ctx.textAlign='right';ctx.fillText('[1 / 2 / 3  ou  setas + ENTER]',W-7,bY+bH-6);ctx.textAlign='left';
  }
}

// ── GAME OVER ──────────────────────────────────────────────────────
function rGameover(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,15,W/2,H/2,W*.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,20,60,.7)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#102060';ctx.font='7px "Press Start 2P"';ctx.fillText('INCORRETO',W/2,32);
  ctx.fillStyle='#c0a830';ctx.font='4px "Press Start 2P"';
  S.goMsg.forEach((l,i)=>ctx.fillText(l,W/2,54+i*12));
  if(S.mf<.92){
    ctx.fillStyle='#c0d0e8';ctx.font='5px "Press Start 2P"';
    ctx.fillText('ENTER: tentar novamente',W/2,148);
  }
  ctx.textAlign='left';
}

// ── EPIFANIA ───────────────────────────────────────────────────────
function rEpiphany(){
  const t=S.epT;
  const p=Math.min(1,t/1.4);
  // Flash inicial: azul-branco frio (razão crítica)
  ctx.fillStyle=`rgb(${~~(p*180)},${~~(p*205)},${~~(p*235)})`;
  ctx.fillRect(0,0,W,H);
  if(t>1){
    ctx.fillStyle='rgba(4,6,18,.88)';ctx.fillRect(0,0,W,H);
    const ga=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.85);
    ga.addColorStop(0,'rgba(140,170,230,.22)');ga.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ga;ctx.fillRect(0,0,W,H);
    const ta=Math.min(1,(t-1)/.9);
    ctx.globalAlpha=ta;ctx.textAlign='center';

    // Fase 1 — O Calvinista admite a derrota
    if(t<3.2){
      ctx.fillStyle='#5068a0';ctx.font='3px "Press Start 2P"';
      ctx.fillText('"...Impossível. Você delimitou a razão."',W/2,H/2-32);
      ctx.fillStyle='#7090c0';ctx.font='4px "Press Start 2P"';
      ctx.fillText('Stand THE ANCIENT se fragmenta.',W/2,H/2-18);
      ctx.fillStyle='#4060a0';ctx.font='3px "Press Start 2P"';
      ctx.fillText('"Talvez o limite seja exatamente',W/2,H/2-4);
      ctx.fillText('o que a razão tem de confiável."',W/2,H/2+6);
    }
    // Fase 2 — CLOSE TO THE EDGE
    if(t>2.8){
      const ta2=Math.min(1,(t-2.8)/.9);ctx.globalAlpha=ta*ta2;
      ctx.fillStyle='rgba(4,6,18,.75)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#c0a830';ctx.font='7px "Press Start 2P"';
      ctx.fillText('CLOSE TO THE EDGE',W/2,H/2-20);
      ctx.fillStyle='#8090c0';ctx.font='4px "Press Start 2P"';
      ctx.fillText('Mas o limite é o fundamento.',W/2,H/2-4);
    }
    // Fase 3 — Síntese dos quatro filósofos
    if(t>4.2){
      const ta3=Math.min(1,(t-4.2)*.75);ctx.globalAlpha=ta*ta3;
      ctx.fillStyle='#8090b8';ctx.font='3px "Press Start 2P"';
      ctx.fillText('Bacon limpou a visão.',W/2,H/2+18);
      ctx.fillText('Locke organizou a experiência.',W/2,H/2+28);
      ctx.fillText('Hume dissolveu a ilusão de necessidade.',W/2,H/2+38);
      ctx.fillStyle='#c0a830';
      ctx.fillText('Kant: a necessidade está no sujeito.',W/2,H/2+50);
    }
    // Fase 4 — Parabéns
    if(t>5.8){
      const ta4=Math.min(1,(t-5.8)*.85);ctx.globalAlpha=ta*ta4;
      ctx.fillStyle='#c0a830';ctx.font='6px "Press Start 2P"';ctx.fillText('PARABÉNS!',W/2,H/2+68);
      ctx.fillStyle='#7080b0';ctx.font='4px "Press Start 2P"';
      ctx.fillText('O Calvinista de Königsberg concluído.',W/2,H/2+80);
    }
    // Fase 5 — Gancho Game 2
    if(t>7.6){
      const ta5=Math.min(1,(t-7.6)*.55);ctx.globalAlpha=ta*ta5;
      ctx.fillStyle='#4a5888';ctx.font='3px "Press Start 2P"';
      ctx.fillText('Mas se o sujeito estrutura o objeto...',W/2,H/2+96);
      ctx.fillText('quem estrutura o sujeito?',W/2,H/2+108);
      ctx.fillStyle='#303c60';
      ctx.fillText('Quatro silhuetas no horizonte.',W/2,H/2+120);
      ctx.fillText('"— Essa pergunta é nossa."',W/2,H/2+130);
      ctx.fillStyle='#202840';
      ctx.fillText('[To be continued — Game 2]',W/2,H/2+142);
    }
    if(t>9.6){
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(4,6,18,.92)';ctx.fillRect(0,H-26,W,26);
      if(S.frame%30<20){
        ctx.fillStyle='#c0a830';ctx.font='4px "Press Start 2P"';
        ctx.fillText('ENTER → ver o Final',W/2,H-10);
      }
    }
    ctx.globalAlpha=1;ctx.textAlign='left';
  }
}

// ── LOOP ───────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-(S.lastT||ts))/1000,.05);
  S.lastT=ts;update(dt);render();requestAnimationFrame(loop);
}
document.fonts.ready.then(()=>requestAnimationFrame(loop));
</script>
</body>
